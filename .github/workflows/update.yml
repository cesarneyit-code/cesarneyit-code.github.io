name: Update page from arXiv

on:
  schedule:
    # First day of each month at 07:00 UTC
    - cron: "0 7 1 * *"
  workflow_dispatch:
    # Allow manual run from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build page
        run: python build/build.py

      - name: Commit updated pages (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update pages from arXiv"
          file_pattern: "index.html publications.html"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
